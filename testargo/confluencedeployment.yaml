apiVersion: apps/v1
kind: Deployment
metadata:
  name: confluence-deployment
  labels:
    app: confluence
spec:
  replicas: 5
  selector:
    matchLabels:
      app: confluence
  template:
    metadata:
      labels:
        app: confluence
    spec:
      containers:
      - name: confluence
        image: atlassian/confluence:8.3.1
        ports:
        - containerPort: 80
        - containerPort: 8090
        - containerPort: 8080


---
apiVersion: v1
kind: Service
metadata:
  name: confluence-service
  labels:
    app:  confluence
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8090
    protocol: TCP
  selector:
    app: confluence